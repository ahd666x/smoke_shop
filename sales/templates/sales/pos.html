{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صندوق فروش</title>
    <link class="styles" rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        :root {
            --bg-main: #f8fafc;
            --border-color: #f1f5f9;
            --text-muted: #64748b;
            --accent-color: #0f172a;
        }
        body { 
            background: var(--bg-main); 
            font-family: 'Vazir', Tahoma, sans-serif; 
            color: #1e293b;
        }
        .navbar-minimal {
            background: #ffffff;
            border-bottom: 1px solid var(--border-color);
        }
        .card-minimal {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.02), 0 2px 4px -2px rgb(0 0 0 / 0.02);
        }
        .form-control-minimal {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        .form-control-minimal:focus {
            background-color: #fff;
            border-color: #cbd5e1;
            box-shadow: none;
        }
        .btn-minimal {
            border-radius: 10px;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .quantity-btn { 
            width: 32px; 
            height: 32px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px !important;
        }
        #cart-table th { 
            background-color: #f8fafc; 
            color: var(--text-muted);
            font-weight: 600; 
            border-bottom: 2px solid var(--border-color);
        }
        #cart-table td { vertical-align: middle; }
        .held-card {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            transition: all 0.2s;
        }
        .held-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05); }
        .tooltip-inner { text-align: right; }
    </style>
</head>
<body>

<!-- نوار بالایی مینیمال -->
<nav class="navbar navbar-minimal mb-4 py-3">
    <div class="container-fluid px-4">
        <a class="navbar-brand text-dark fw-bold m-0 fs-5" href="{% url 'home' %}">🏪 فروشگاه دخانیات</a>
        <div class="d-flex gap-2">
            <a href="{% url 'dashboard' %}" class="btn btn-minimal btn-outline-secondary btn-sm px-3">📊 داشبورد</a>
            <a href="{% url 'home' %}" class="btn btn-minimal btn-outline-secondary btn-sm px-3">🏠 خانه</a>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-4">
        
        <!-- ستون سمت راست: جستجو، اسکن و پرداخت -->
        <div class="col-lg-4 col-12 order-lg-1 order-2">
            <!-- بارکد و جستجو -->
            <div class="card card-minimal p-4 mb-4 position-relative">
                <h6 class="fw-bold mb-3 text-secondary">🔍 افزودن کالا</h6>
                <div class="mb-3">
                    <input type="text" id="barcode" class="form-control form-control-minimal form-control-lg text-center" placeholder="[ اسکن بارکد کالا ]">
                </div>
                <div class="input-group">
                    <input type="text" id="search-input" class="form-control form-control-minimal" placeholder="جستجوی نام یا بارکد...">
                    <button class="btn btn-minimal btn-dark px-3" onclick="searchProducts()">جستجو</button>
                </div>
                <ul id="search-results" class="list-group position-absolute start-0 end-0 mx-4 mt-2 card-minimal p-0" style="z-index:1000; display:none; top: 100%;"></ul>
            </div>

            <!-- بخش پرداخت -->
            <div class="card card-minimal p-4">
                <h6 class="fw-bold mb-3 text-secondary">💳 تسویه حساب</h6>
                <button class="btn btn-minimal btn-success btn-lg w-100 py-3 mb-3 fw-bold shadow-sm" onclick="showPayment()">شروع فرآیند پرداخت</button>
                
                <div id="payment-section" style="display:none;" class="pt-2 border-top">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">پرداخت نقدی (تومان)</label>
                        <input type="number" id="cash-amount" class="form-control form-control-minimal" value="0" min="0" step="5000" oninput="updateCardAmount()">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">پرداخت کارتی (تومان)</label>
                        <input type="number" id="card-amount" class="form-control form-control-minimal text-muted" value="0" readonly>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4 p-2 bg-light rounded-3">
                        <span class="text-muted small">مجموع پرداختی:</span>
                        <div>
                            <strong id="total-paid" class="fs-5">0</strong> <span class="small text-muted">تومان</span>
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-8">
                            <button class="btn btn-minimal btn-primary w-100 py-2" onclick="finalizePayment()">ثبت نهایی</button>
                        </div>
                        <div class="col-4">
                            <button class="btn btn-minimal btn-outline-secondary w-100 py-2" onclick="hidePayment()">انصراف</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ستون سمت چپ: سبد خرید (بخش اصلی) -->
        <div class="col-lg-8 col-12 order-lg-2 order-1">
            <div class="card card-minimal p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0 text-secondary">🛒 سبد خرید جاری</h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-minimal btn-outline-warning btn-sm" onclick="holdOrder()">🛑 نگهداری سبد</button>
                        {% if held_count > 0 %}
                            <button class="btn btn-minimal btn-outline-dark btn-sm position-relative" onclick="showHeldOrders()">
                                📋 سبدها
                                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">{{ held_count }}</span>
                            </button>
                        {% endif %}
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="cart-table">
                        <thead>
                            <tr>
                                <th>کالا</th>
                                <th style="width: 160px;">تعداد</th>
                                <th>فی (تومان)</th>
                                <th>جمع (تومان)</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- ردیف‌ها به صورت پویا با JS تزریق می‌شوند -->
                        </tbody>
                    </table>
                </div>

                <!-- بخش تخفیف و مجموع قیمت -->
                <div class="row mt-4 pt-3 border-top g-3 align-items-center">
                    <div class="col-md-6 col-12">
                        <div class="input-group">
                            <select id="discount-type" class="form-select form-control-minimal bg-white" style="max-width:110px;" onchange="updateDiscount()">
                                <option value="amount" selected>مبلغی</option>
                                <option value="percent">درصدی</option>
                                <option value="none">بدون تخفیف</option>
                            </select>
                            <input type="number" id="discount-value" class="form-control form-control-minimal" value="0" min="0" step="5000" onchange="updateDiscount()">
                            <span class="input-group-text bg-light border-0 text-muted">تومان</span>
                        </div>
                    </div>
                    <div class="col-md-6 col-12 text-md-end text-center">
                        <div class="fs-5 fw-bold">
                            <span class="text-muted fw-normal">قابل پرداخت:</span>
                            <span id="grand-total" class="text-dark mx-1 fs-3">0</span>
                            <span class="text-muted fs-6 fw-normal">تومان</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- مودال سبدها -->
<div class="modal fade" id="heldModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 rounded-4 shadow-lg">
      <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
        <h5 class="fw-bold m-0">سبدهای نگهداری‌شده</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="held-list"></div>
    </div>
  </div>
</div>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
<script>
    const csrftoken = '{{ csrf_token }}';
    let grandTotalToman = 0;

    function enableTooltips() {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl, { placement: 'top' })
        })
    }

    enableTooltips();
    document.getElementById('barcode').focus();

    document.getElementById('barcode').addEventListener('keypress', e => {
        if (e.key === 'Enter') {
            const barcode = e.target.value; e.target.value = '';
            addProduct(barcode, null);
        }
    });

    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    document.addEventListener('click', function(e) {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.style.display = 'none';
        }
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            searchResults.style.display = 'none';
            searchInput.blur();
        }
    });

    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            searchProducts();
        }
    });

    function searchProducts() {
        const q = searchInput.value.trim();
        if (q.length < 2) return;

        fetch('/sales/search-products/?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                searchResults.innerHTML = '';
                if (data.length === 0) {
                    searchResults.innerHTML = '<li class="list-group-item text-muted border-0 p-3">نتیجه‌ای یافت نشد</li>';
                } else {
                    data.forEach(p => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item list-group-item-action border-0 p-3';
                        li.style.cursor = 'pointer';
                        let costText = p.cost ? `<br><small class="text-muted">قیمت خرید: ${p.cost.toLocaleString()} تومان</small>` : '';
                        li.innerHTML = `<strong>${p.name}</strong> <span class="text-muted small">(${p.barcode})</span><div class="text-primary small fw-bold mt-1">${p.price.toLocaleString()} تومان${costText}</div>`;
                        li.addEventListener('click', function() {
                            addProduct(null, p.id);
                            searchResults.style.display = 'none';
                            searchInput.value = '';
                            searchInput.focus();
                        });
                        searchResults.appendChild(li);
                    });
                }
                searchResults.style.display = 'block';
            })
            .catch(err => {
                console.error(err);
                searchResults.innerHTML = '<li class="list-group-item text-danger border-0 p-3">خطا در جستجو</li>';
                searchResults.style.display = 'block';
            });
    }

    function addProduct(barcode, productId) {
        fetch('/sales/add-to-cart/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify(barcode ? {barcode} : {product_id: productId})
        }).then(r => r.json()).then(data => updateCart(data));
    }

    function updateCart(data) {
        let tbody = document.querySelector('#cart-table tbody');
        tbody.innerHTML = '';
        data.cart.forEach((item, idx) => {
            const unitPrice = item.unit_price;
            const rowTotal = (item.unit_price * item.quantity) + item.tax;
            let tooltipText = item.purchase_cost ? `قیمت خرید: ${item.purchase_cost.toLocaleString()} تومان` : '';
            tbody.innerHTML += `<tr>
                <td><span class="fw-bold" data-bs-toggle="tooltip" title="${tooltipText}">${item.name}</span></td>
                <td>
                    <div class="input-group input-group-sm flex-nowrap" style="max-width: 140px;">
                        <button class="btn btn-outline-secondary quantity-btn border-1" onclick="updateCartItem(${idx}, 'decrease')">-</button>
                        <input type="number" value="${item.quantity}" min="0.001" step="any" class="form-control text-center mx-1 border-0 bg-light rounded" onchange="updateQuantityManually(${idx}, this.value)">
                        <button class="btn btn-outline-secondary quantity-btn border-1" onclick="updateCartItem(${idx}, 'increase')">+</button>
                    </div>
                </td>
                <td class="text-secondary">${unitPrice.toLocaleString()}</td>
                <td class="fw-bold">${rowTotal.toLocaleString()}</td>
                <td><button class="btn btn-sm btn-link text-danger p-0" onclick="removeItem(${idx})">حذف</button></td>
            </tr>`;
        });

        document.getElementById('grand-total').textContent = data.grand_total.toLocaleString();
        grandTotalToman = data.grand_total;
        enableTooltips();
    }

    function removeItem(idx) {
        fetch('/sales/remove-from-cart/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({index: idx})
        }).then(r => r.json()).then(data => { if (data.error) alert(data.error); else updateCart(data); });
    }

    function updateCartItem(idx, action) {
        fetch('/sales/update-cart-item/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({index: idx, action: action})
        }).then(r => r.json()).then(data => { if (data.error) alert(data.error); else updateCart(data); });
    }

    function updateQuantityManually(idx, newQuantity) {
        const qty = parseFloat(newQuantity);
        if (isNaN(qty) || qty <= 0) {
            alert('مقدار تعداد باید یک عدد مثبت باشد.');
            return;
        }
        fetch('/sales/update-cart-item/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({index: idx, action: 'set', quantity: qty})
        }).then(r => r.json()).then(data => {
            if (data.error) alert(data.error);
            else updateCart(data);
        });
    }

    function updateDiscount() {
        const type = document.getElementById('discount-type').value;
        let value = parseFloat(document.getElementById('discount-value').value) || 0;
        fetch('/sales/apply-discount/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({type: type, value: value})
        }).then(r => r.json()).then(data => updateCart(data));
    }

    function showPayment() {
        document.getElementById('cash-amount').value = 0;
        document.getElementById('card-amount').value = grandTotalToman;
        document.getElementById('payment-section').style.display = 'block';
        updateTotalPaid();
    }

    function hidePayment() { document.getElementById('payment-section').style.display = 'none'; }

    function updateCardAmount() {
        const cashToman = parseInt(document.getElementById('cash-amount').value) || 0;
        const cardToman = Math.max(0, grandTotalToman - cashToman);
        document.getElementById('card-amount').value = cardToman;
        updateTotalPaid();
    }

    function updateTotalPaid() {
        const cash = parseInt(document.getElementById('cash-amount').value) || 0;
        const card = parseInt(document.getElementById('card-amount').value) || 0;
        document.getElementById('total-paid').textContent = (cash + card).toLocaleString();
    }

    function finalizePayment() {
        const cashToman = parseInt(document.getElementById('cash-amount').value) || 0;
        const cardToman = parseInt(document.getElementById('card-amount').value) || 0;

        if (cashToman + cardToman < grandTotalToman) {
            alert('مبلغ پرداختی کافی نیست');
            return;
        }

        fetch('/sales/checkout/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({
                cash_amount: cashToman,
                card_amount: cardToman,
                credit_amount: 0,
                customer_id: null
            })
        }).then(r => r.json()).then(data => {
            if (data.error) alert(data.error);
            else {
                location.reload();
            }
        });
    }

    function holdOrder() {
        if (confirm('سبد فعلی نگهداری شود؟')) {
            fetch('/sales/hold-order/', { method:'POST', headers:{'X-CSRFToken': csrftoken} })
                .then(r => r.json()).then(data => { alert(data.message); location.reload(); });
        }
    }

    function showHeldOrders() {
        fetch('/sales/held-orders/')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('held-list');
                if (data.length === 0) {
                    container.innerHTML = '<div class="text-center text-muted py-4">هیچ سبد نگهداری‌شده‌ای وجود ندارد.</div>';
                } else {
                    let html = '';
                    data.forEach(o => {
                        html += `
                        <div class="card held-card mb-3 p-3">
                            <div class="d-flex justify-content-between align-items-center flex-wrap g-2">
                                <div>
                                    <h6 class="fw-bold mb-1">سفارش #${o.id}</h6>
                                    <small class="text-muted d-block mb-2">${o.held_at}</small>
                                    <span class="badge bg-light text-dark border">${o.items_count} قلم</span>
                                    <span class="ms-2 fw-bold text-primary">${o.grand_total.toLocaleString()} تومان</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-minimal btn-primary" onclick="resumeHeld(${o.id})">ادامه</button>
                                    <button class="btn btn-sm btn-minimal btn-outline-danger" onclick="deleteHeld(${o.id})">حذف</button>
                                </div>
                            </div>
                        </div>`;
                    });
                    container.innerHTML = html;
                }
                new bootstrap.Modal(document.getElementById('heldModal')).show();
            });
    }

    function deleteHeld(orderId) {
        if (!confirm('آیا از حذف این سبد نگهداری‌شده اطمینان دارید؟')) return;
        fetch('/sales/delete-held-order/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': csrftoken},
            body: JSON.stringify({ order_id: orderId })
        })
        .then(r => r.json())
        .then(data => {
            alert(data.message);
            showHeldOrders();
        });
    }

    function resumeHeld(orderId) {
        fetch('/sales/resume-held/', {
            method:'POST', headers:{'Content-Type':'application/json','X-CSRFToken': csrftoken},
            body: JSON.stringify({order_id: orderId})
        }).then(r => r.json()).then(data => {
            updateCart(data);
            bootstrap.Modal.getInstance(document.getElementById('heldModal')).hide();
        });
    }
</script>
</body>
</html>
