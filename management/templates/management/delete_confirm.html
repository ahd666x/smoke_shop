{% extends 'management/base.html' %}
{% block title %}حذف {{ object }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ حذف آیتم</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">آیا از حذف «<strong>{{ object }}</strong>» اطمینان دارید؟</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger">بله، حذف کن</button>
                        <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-secondary">لغو</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
